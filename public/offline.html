<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Bar Inventory</title>
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root {
      --primary-color: #4f46e5;
      --secondary-color: #6366f1;
      --background-color: #0f172a;
      --text-color: #f9fafb;
      --secondary-text: #cbd5e1;
      --font-family: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-family);
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 400px;
      padding: 2rem;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wifi-icon {
      width: 120px;
      height: 120px;
      position: relative;
    }

    .wifi-icon circle {
      fill: none;
      stroke: var(--primary-color);
      stroke-width: 4;
      stroke-dasharray: 157;
      stroke-dashoffset: 157;
      animation: pulse 1.5s infinite;
    }

    .wifi-icon circle:nth-child(1) { animation-delay: 0s; }
    .wifi-icon circle:nth-child(2) { animation-delay: 0.3s; }
    .wifi-icon circle:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0% { stroke-dashoffset: 157; opacity: 0.3; }
      50% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 157; opacity: 0.3; }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    p {
      font-size: 1rem;
      color: var(--secondary-text);
      line-height: 1.5;
    }

    .retry-button {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(79,70,229,0.4);
    }

    .retry-button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(79,70,229,0.6);
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .loader div {
      width: 12px;
      height: 12px;
      background: var(--primary-color);
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }

    .loader div:nth-child(2) { animation-delay: 0.2s; }
    .loader div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-15px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <svg class="wifi-icon" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="15"/>
      <circle cx="32" cy="32" r="25"/>
      <circle cx="32" cy="32" r="35"/>
    </svg>

    <h1>Vous êtes hors ligne</h1>
    <p>La connexion Internet est absente. Cliquez sur "Réessayer" pour revenir à la page de connexion.</p>
    <button class="retry-button" onclick="retry()">Réessayer</button>
  </div>

  <script>
    function retry() {
      window.location.assign("/login");
    }

    // Redirection automatique dès que la connexion revient
    window.addEventListener('online', () => {
      window.location.assign("/login");
    });

    // Vérification périodique de la page /login
    setInterval(async () => {
      if (navigator.onLine) {
        try {
          const response = await fetch('/login', { method: 'HEAD' });
          if (response.ok) window.location.assign("/login");
        } catch (err) {
          // Toujours hors ligne
        }
      }
    }, 5000);
  </script>
</body>
</html>
